<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Project 1</title>
  </head>
  <body>
    <main>
      <h1>To-Do List</h1>
      <p>Welcome to your To-Do List!</p>
      <div class="topbar">
        <button id="addToDoButton">Create a new todo</button>
        <button id="theme-toggle">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
      <div class="filters">
        <button class="filter-item" data-sort="name">
          Name <span class="sort-icon">⇅</span>
        </button>
        <button class="filter-item" data-sort="dueDate">
          Due Date <span class="sort-icon">⇅</span>
        </button>
        <button class="filter-item" data-sort="createdAt">
          Creation Date <span class="sort-icon">⇅</span>
        </button>
        <button class="filter-item" data-sort="priority">
          Priority <span class="sort-icon">⇅</span>
        </button>
        <button class="filter-item" data-sort="complete">
          Complete <span class="sort-icon">⇅</span>
        </button>
      </div>
    </main>
  </body>
</html>
<script src="script.js"></script>
