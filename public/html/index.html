<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Project 1 - To-Do List</title>

    <link rel="stylesheet" href="/public/css/styles.css" />

    <script src="/public/js/utils.js" defer></script>

    <script src="/public/js/libraries/handlebars.min.js" defer></script>

    <script
      src="/public/js/controllers/theme-controller.js"
      type="module"
      defer
    ></script>

    <script
      src="/public/js/controllers/todo-list-controller.js"
      type="module"
      defer
    ></script>
  </head>

  <body>
    <main>
      <h1>To-Do List</h1>
      <p>Welcome to your To-Do List!</p>
      <div class="topbar">
        <a class="button" href="/public/html/create-todo.html">
          Create a new todo
        </a>
        <button class="button" id="theme-toggle">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
      <div class="filters">
        <button
          class="button filter-item"
          data-sort="name"
          data-sort-direction="none"
        >
          Name
        </button>
        <button
          class="button filter-item"
          data-sort="dueDate"
          data-sort-direction="none"
        >
          Due Date
        </button>
        <button
          class="button filter-item"
          data-sort="createdAt"
          data-sort-direction="none"
        >
          Creation Date
        </button>
        <button
          class="button filter-item"
          data-sort="priority"
          data-sort-direction="none"
        >
          Priority
        </button>
        <button
          class="button filter-item"
          data-sort="complete"
          data-sort-direction="none"
        >
          Complete
        </button>
      </div>
      <div class="container-todo">
        <ul class="todo-list">
          <!--Wird durch Controller + Handlebars gerendert-->
        </ul>
      </div>
    </main>
    <script id="todo-template" type="text/x-handlebars-template">

      {{#each todos}}
      <li class="todo-item">
        <div class="checkbox-area">
          <input
            type="checkbox"
            {{#if complete}}checked{{/if}}
          />
          <span>
            {{#if complete}}Done{{else}}Open{{/if}}
          </span>
        </div>
        <div class="content-area">
          <h2>{{name}}</h2>
          <div>{{content}}</div>
          <div>{{dueDate}}</div>
        </div>
        <div class="priority-area">
          {{priority}}
        </div>
        <div class="actions-area">
          <button
            class="button"
            data-action="delete"
            data-id="{{id}}"
          >
            Delete
          </button>
        </div>
      </li>
      {{/each}}
    </script>
  </body>
</html>
